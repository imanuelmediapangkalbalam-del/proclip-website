name: Deploy GitHub Pages (static demo)

# Full SaaS API routes require Vercel. This workflow only builds when GITHUB_PAGES=true.
# Prefer Vercel for production. Keep this for optional static marketing snapshots.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Full-stack ProClip needs Vercel + Neon + R2 + Upstash."
          echo "Use workflow_dispatch only after extracting a static marketing subset."
          echo "Primary deploy target: Vercel (connect this repo)."
